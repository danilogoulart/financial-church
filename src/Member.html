<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial;
      padding:20px;
    }

    input{
      width:100%;
      margin-bottom:12px;
      padding:8px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:10px;
      cursor:pointer;
      font-size:15px;
      background:#1E88E5;
      color:#fff;
      border:none;
      border-radius:4px;
    }

    button:disabled{
      opacity:.6;
      cursor:default;
    }

  </style>

</head>

<body>

<h2>Novo Membro</h2>

<input id="name" placeholder="Nome">

<input id="phone" placeholder="Telefone">

<input id="family" placeholder="Família">

<input id="ministry" placeholder="Ministério">

<label>
<input id="tither" type="checkbox" checked>
É dizimista
</label>

<br><br>

<button id="saveBtn" onclick="save()">
Salvar
</button>

<script>

function save(){

  const button=document.getElementById("saveBtn");
  button.disabled=true;
  button.textContent="Salvando...";

  const member={

    name:document.getElementById("name").value,

    phone:document.getElementById("phone").value,

    family:document.getElementById("family").value,

    ministry:document.getElementById("ministry").value,

    tither:document.getElementById("tither").checked

  };

  google.script.run

    .withSuccessHandler(function(result){

      alert("Membro "+result.id+" cadastrado.");

      google.script.host.close();

    })

    .withFailureHandler(function(err){

      alert(err.message);

      button.disabled=false;
      button.textContent="Salvar";

    })

    .saveMember(member);

}

</script>

</body>

</html>

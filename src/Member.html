<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{

font-family:Arial;

padding:20px;

}

label{

display:block;

margin-top:12px;

font-weight:bold;

}

input{

width:100%;

padding:8px;

box-sizing:border-box;

}

.checkbox{

margin-top:15px;

}

button{

margin-top:20px;

padding:10px 18px;

cursor:pointer;

}

#status{

margin-top:15px;

color:green;

}

</style>

</head>

<body>

<h2>Novo Membro</h2>

<label>Nome *</label>

<input id="name">

<label>Telefone</label>

<input id="phone">

<label>Família</label>

<input id="family">

<label>Ministério</label>

<input id="ministry">

<div class="checkbox">

<label>

<input
type="checkbox"
id="tither"
checked>

É dizimista

</label>

</div>

<button onclick="save()">

Salvar

</button>

<div id="status"></div>

<script>

function save(){

const data={

name:document.getElementById("name").value,

phone:document.getElementById("phone").value,

family:document.getElementById("family").value,

ministry:document.getElementById("ministry").value,

tither:document.getElementById("tither").checked

};

google.script.run

.withSuccessHandler(function(member){

document.getElementById("status").innerHTML=

"Membro "+member.id+" salvo com sucesso.";

setTimeout(function(){

google.script.host.close();

},1000);

})

.withFailureHandler(function(err){

alert(err.message);

})

.saveMember(data);

}

</script>

</body>

</html>

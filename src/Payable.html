<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial;
      padding:20px;
    }

    label{
      display:block;
      font-size:13px;
      font-weight:bold;
      margin-bottom:4px;
    }

    input,select,textarea{
      width:100%;
      margin-bottom:12px;
      padding:8px;
      box-sizing:border-box;
      font-size:14px;
    }

    .row{
      display:flex;
      gap:12px;
    }

    .row > div{
      flex:1;
    }

    small{
      color:#666;
    }

    button{
      width:100%;
      padding:10px;
      cursor:pointer;
      font-size:15px;
      background:#1E88E5;
      color:#fff;
      border:none;
      border-radius:4px;
    }

    button:disabled{
      opacity:.6;
      cursor:default;
    }

  </style>

</head>

<body>

<h2>Nova Conta a Pagar</h2>

<label>Descrição</label>
<input id="description" placeholder="Ex.: Conta de luz - Julho">

<label>Categoria</label>
<select id="category"></select>

<div class="row">
  <div>
    <label>Valor (R$)</label>
    <input id="amount" type="number" step="0.01" min="0" placeholder="0,00">
  </div>
  <div>
    <label>Vencimento</label>
    <input id="dueDate" type="date">
  </div>
</div>

<label>Pagamento <small>(opcional)</small></label>
<input id="paymentDate" type="date">
<small>Se preenchido, a conta é registrada como <b>Paga</b>.</small>

<br><br>

<button id="saveBtn" onclick="save()">Salvar</button>

<script>

  function init(){

    google.script.run
      .withSuccessHandler(fillCategories)
      .withFailureHandler(showError)
      .listPayableCategories();

  }

  function fillCategories(categories){

    var select = document.getElementById("category");
    select.innerHTML = "";

    (categories || []).forEach(function(category){
      var option = document.createElement("option");
      option.value = category;
      option.text = category;
      select.appendChild(option);
    });

  }

  function save(){

    var button = document.getElementById("saveBtn");
    button.disabled = true;
    button.textContent = "Salvando...";

    var payable = {
      description: document.getElementById("description").value,
      category: document.getElementById("category").value,
      amount: document.getElementById("amount").value,
      dueDate: document.getElementById("dueDate").value,
      paymentDate: document.getElementById("paymentDate").value
    };

    google.script.run
      .withSuccessHandler(function(result){
        alert("Conta " + result.id + " registrada.");
        google.script.host.close();
      })
      .withFailureHandler(function(err){
        alert(err.message);
        button.disabled = false;
        button.textContent = "Salvar";
      })
      .savePayable(payable);

  }

  function showError(err){
    alert(err.message);
  }

  init();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial;
      padding:20px;
    }

    label{
      display:block;
      font-size:13px;
      font-weight:bold;
      margin-bottom:4px;
    }

    input,select,textarea{
      width:100%;
      margin-bottom:12px;
      padding:8px;
      box-sizing:border-box;
      font-size:14px;
    }

    .row{
      display:flex;
      gap:12px;
    }

    .row > div{
      flex:1;
    }

    button{
      width:100%;
      padding:10px;
      cursor:pointer;
      font-size:15px;
      background:#1E88E5;
      color:#fff;
      border:none;
      border-radius:4px;
    }

    button:disabled{
      opacity:.6;
      cursor:default;
    }

  </style>

</head>

<body>

<h2>Nova Movimentação</h2>

<div class="row">
  <div>
    <label>Data</label>
    <input id="date" type="date">
  </div>
  <div>
    <label>Competência</label>
    <input id="competency" type="month">
  </div>
</div>

<label>Tipo</label>
<select id="type" onchange="fillCategories()">
  <option value="Receita">Receita</option>
  <option value="Despesa">Despesa</option>
</select>

<label>Membro</label>
<select id="memberId">
  <option value="">Carregando...</option>
</select>

<label>Categoria</label>
<select id="category"></select>

<div class="row">
  <div>
    <label>Culto</label>
    <input id="cult" placeholder="Ex.: Domingo Manhã">
  </div>
  <div>
    <label>Forma de pagamento</label>
    <select id="paymentMethod">
      <option>Dinheiro</option>
      <option>PIX</option>
      <option>Cartão de Débito</option>
      <option>Cartão de Crédito</option>
      <option>Transferência</option>
      <option>Cheque</option>
    </select>
  </div>
</div>

<label>Valor (R$)</label>
<input id="amount" type="number" step="0.01" min="0" placeholder="0,00">

<label>Observação</label>
<textarea id="observation" rows="2"></textarea>

<button id="saveBtn" onclick="save()">Salvar</button>

<script>

  var CATEGORIES = { income: [], expense: [] };

  function init(){

    var today = new Date();
    var iso = today.toISOString().slice(0, 10);
    document.getElementById("date").value = iso;
    document.getElementById("competency").value = iso.slice(0, 7);

    google.script.run
      .withSuccessHandler(fillMembers)
      .withFailureHandler(showError)
      .listMembers();

    google.script.run
      .withSuccessHandler(function(categories){
        CATEGORIES = categories;
        fillCategories();
      })
      .withFailureHandler(showError)
      .listCategories();

  }

  function fillMembers(members){

    var select = document.getElementById("memberId");
    select.innerHTML = '<option value="">Selecione...</option>';

    members.forEach(function(member){
      var option = document.createElement("option");
      option.value = member.id;
      option.text = member.name;
      select.appendChild(option);
    });

  }

  function fillCategories(){

    var type = document.getElementById("type").value;
    var list = type === "Despesa" ? CATEGORIES.expense : CATEGORIES.income;

    var select = document.getElementById("category");
    select.innerHTML = "";

    (list || []).forEach(function(category){
      var option = document.createElement("option");
      option.value = category;
      option.text = category;
      select.appendChild(option);
    });

  }

  function save(){

    var button = document.getElementById("saveBtn");
    button.disabled = true;

    var transaction = {
      date: document.getElementById("date").value,
      competency: document.getElementById("competency").value,
      memberId: document.getElementById("memberId").value,
      type: document.getElementById("type").value,
      category: document.getElementById("category").value,
      cult: document.getElementById("cult").value,
      paymentMethod: document.getElementById("paymentMethod").value,
      amount: document.getElementById("amount").value,
      observation: document.getElementById("observation").value
    };

    google.script.run
      .withSuccessHandler(function(result){
        alert("Movimentação " + result.id + " registrada.");
        google.script.host.close();
      })
      .withFailureHandler(function(err){
        alert(err.message);
        button.disabled = false;
      })
      .saveTransaction(transaction);

  }

  function showError(err){
    alert(err.message);
  }

  init();

</script>

</body>

</html>
